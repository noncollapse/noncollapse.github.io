name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: home_page/package-lock.json

      - name: Install dependencies and build React app
        run: |
          cd home_page
          npm ci
          npm run build

      - name: Build legacy Jekyll site
        run: |
          cd legacy
          bundle install
          bundle exec jekyll build --destination _site

      - name: Prepare deployment files
        run: |
          # Create public directory structure
          mkdir -p public/legacy/_data
          
          # Copy React app (from home_page/dist)
          cp -r home_page/dist/* public/
          
          # Copy Jekyll built files to legacy subfolder
          cp -r legacy/_site/* public/legacy/
          
          # Copy data files for React app to access
          cp legacy/_data/alldetails.yml public/legacy/_data/
          # Copy static files
          cp -r images public/ 2>/dev/null || true
          cp -r js public/ 2>/dev/null || true
          cp -r posters public/ 2>/dev/null || true
          cp google82510fd3084d9a7f.html public/ 2>/dev/null || true
          cp favicon.ico public/ 2>/dev/null || true
          cp favicon.svg public/ 2>/dev/null || true
          cp robots.txt public/ 2>/dev/null || true
          cp sitemap.xml public/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
